<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Briefing Macro Quotidien — YM / NQ</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --warn: #f0883e;
    --red: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 {
    font-size: 20px;
    margin: 0;
    font-weight: 600;
  }
  .date {
    color: var(--muted);
    font-size: 13px;
  }
  button#generate {
    background: var(--accent2);
    color: #0d1117;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }
  button#generate:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  button#generate:hover:not(:disabled) {
    filter: brightness(1.1);
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    font-size: 14px;
  }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    border: 3px solid var(--border);
    border-top: 3px solid var(--accent2);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .briefing {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.65;
  }
  .briefing h2, .briefing h3 {
    color: var(--accent2);
    font-size: 15px;
    margin-top: 18px;
    margin-bottom: 8px;
  }
  .briefing h2:first-child, .briefing h3:first-child { margin-top: 0; }
  table.briefing-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 16px;
    font-size: 12.5px;
  }
  table.briefing-table th, table.briefing-table td {
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
  }
  table.briefing-table th:first-child, table.briefing-table td:first-child {
    text-align: left;
  }
  table.briefing-table th {
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent2);
    font-weight: 600;
  }
  .error {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 16px;
  }
  .meta {
    color: var(--muted);
    font-size: 12px;
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .history-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .history-header {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
  }
  .history-header:hover { background: rgba(255,255,255,0.03); }
  .history-header .chevron { color: var(--muted); font-size: 12px; transition: transform 0.15s; }
  .history-item.open .chevron { transform: rotate(90deg); }
  .history-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .history-item.open .history-body { display: block; padding-top: 14px; }
  .history-empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    font-size: 14px;
  }
  .delete-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 8px;
  }
  .delete-btn:hover { color: var(--red); border-color: var(--red); }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 4px;
  }
  .badge.up { background: rgba(63, 185, 80, 0.15); color: var(--accent); }
  .badge.down { background: rgba(248, 81, 73, 0.15); color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 Briefing Macro — Indices US & Or</h1>
    <span class="date" id="today"></span>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-today-btn">Aujourd'hui</button>
    <button class="tab-btn" id="tab-history-btn">Historique</button>
  </div>

  <div class="tab-panel active" id="tab-today">
    <button id="generate">Générer le briefing du jour</button>

    <div id="content">
      <div class="empty-state">
        Clique sur le bouton pour générer ton briefing macro du jour : Fed, géopolitique, earnings, niveaux clés.
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-history">
    <div id="history-list">
      <div class="history-empty">Chargement de l'historique...</div>
    </div>
  </div>
</div>

<script>
document.getElementById('today').textContent = new Date().toLocaleDateString('fr-FR', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

const btn = document.getElementById('generate');
const content = document.getElementById('content');
const tabTodayBtn = document.getElementById('tab-today-btn');
const tabHistoryBtn = document.getElementById('tab-history-btn');
const tabToday = document.getElementById('tab-today');
const tabHistory = document.getElementById('tab-history');
const historyList = document.getElementById('history-list');

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

tabTodayBtn.addEventListener('click', () => {
  tabTodayBtn.classList.add('active');
  tabHistoryBtn.classList.remove('active');
  tabToday.classList.add('active');
  tabHistory.classList.remove('active');
});

tabHistoryBtn.addEventListener('click', () => {
  tabHistoryBtn.classList.add('active');
  tabTodayBtn.classList.remove('active');
  tabHistory.classList.add('active');
  tabToday.classList.remove('active');
  loadHistory();
});

async function saveBriefing(dateKey, dateLabel, fullText, badgesHtml) {
  try {
    await window.storage.set(`briefing:${dateKey}`, JSON.stringify({
      dateLabel,
      html: fullText,
      badges: badgesHtml || '',
      savedAt: new Date().toISOString()
    }), false);
  } catch (err) {
    console.error("Erreur sauvegarde briefing:", err);
  }
}

async function loadHistory() {
  historyList.innerHTML = `<div class="history-empty">Chargement de l'historique...</div>`;
  try {
    const listResult = await window.storage.list('briefing:', false);
    const keys = (listResult && listResult.keys) ? listResult.keys : [];

    if (keys.length === 0) {
      historyList.innerHTML = `<div class="history-empty">Aucun briefing enregistré pour l'instant. Génère ton premier briefing dans l'onglet "Aujourd'hui".</div>`;
      return;
    }

    const items = [];
    for (const key of keys) {
      try {
        const res = await window.storage.get(key, false);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          items.push({ key, ...parsed });
        }
      } catch (e) {
        // clé illisible, on l'ignore
      }
    }

    items.sort((a, b) => (a.key < b.key ? 1 : -1));

    if (items.length === 0) {
      historyList.innerHTML = `<div class="history-empty">Aucun briefing enregistré pour l'instant.</div>`;
      return;
    }

    historyList.innerHTML = items.map((item, idx) => `
      <div class="history-item" data-key="${item.key}">
        <div class="history-header">
          <span>${item.dateLabel}${item.badges ? `<br>${item.badges}` : ''}</span>
          <span>
            <button class="delete-btn" data-key="${item.key}">Supprimer</button>
            <span class="chevron">▶</span>
          </span>
        </div>
        <div class="history-body">
          <div class="briefing">${item.html}</div>
        </div>
      </div>
    `).join('');

    historyList.querySelectorAll('.history-header').forEach(header => {
      header.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) return;
        header.parentElement.classList.toggle('open');
      });
    });

    historyList.querySelectorAll('.delete-btn').forEach(delBtn => {
      delBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const key = delBtn.dataset.key;
        try {
          await window.storage.delete(key, false);
          loadHistory();
        } catch (err) {
          console.error("Erreur suppression:", err);
        }
      });
    });

  } catch (err) {
    historyList.innerHTML = `<div class="history-empty">Impossible de charger l'historique pour le moment.</div>`;
    console.error("Erreur chargement historique:", err);
  }
}

function renderTable(tableLines) {
  const dataRows = tableLines.filter(l => !/^\|?[\s:|-]+\|?$/.test(l));
  if (dataRows.length === 0) return '';
  let html = '<table class="briefing-table"><tbody>';
  dataRows.forEach((row, idx) => {
    const cells = row.split('|').map(c => c.trim());
    if (cells[0] === '') cells.shift();
    if (cells[cells.length - 1] === '') cells.pop();
    const tag = idx === 0 ? 'th' : 'td';
    html += '<tr>' + cells.map(c => `<${tag}>${c.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</${tag}>`).join('') + '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function simpleMarkdownToHtml(text) {
  const lines = text.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    let line = lines[i];
    if (line.trim().startsWith('|')) {
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      html += renderTable(tableLines);
      continue;
    }
    if (/^### /.test(line)) { html += `<h3>${line.replace(/^### /, '')}</h3>`; i++; continue; }
    if (/^## /.test(line)) { html += `<h2>${line.replace(/^## /, '')}</h2>`; i++; continue; }
    if (/^# /.test(line)) { html += `<h2>${line.replace(/^# /, '')}</h2>`; i++; continue; }
    line = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    if (/^- /.test(line)) { html += `• ${line.replace(/^- /, '')}<br>`; i++; continue; }
    if (line.trim() === '') { html += '<br>'; i++; continue; }
    html += line + '<br>';
    i++;
  }
  return html;
}

async function callClaude(prompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
      tools: [{ type: "web_search_20250305", name: "web_search" }]
    })
  });

  if (!response.ok) {
    throw new Error(`Erreur API: ${response.status}`);
  }

  const data = await response.json();
  const text = data.content
    .filter(block => block.type === "text")
    .map(block => block.text)
    .join("\n");

  if (!text.trim()) {
    throw new Error("Réponse vide reçue.");
  }
  return text;
}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  content.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      Partie 1/4 : Fed, dollar, géopolitique, calendrier économique...
    </div>
  `;

  const today = new Date().toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' });

  const promptPart1 = `Tu es un analyste macro qui prépare un briefing quotidien pour un day trader actif sur les futures US indices, basé en Europe, qui trade en session US.

Nous sommes le ${today}. Utilise la recherche web pour trouver les informations les PLUS RÉCENTES et rédige en français, avec ces 3 sections uniquement :

## Fed & Taux
Dernières déclarations, décisions ou anticipations de la Fed (sous Kevin Warsh si toujours en poste), niveau des taux, prochaines échéances importantes. 2-3 phrases max.

## Géopolitique
Tensions ou développements US-Iran, US-Chine, ou autres événements géopolitiques susceptibles d'impacter les indices US aujourd'hui. 2-3 phrases max.

## Dollar (DXY)
Niveau actuel du DXY (indice dollar), variation du jour, et ce que ça implique pour les indices actions et l'or (corrélation inverse habituelle). 1-2 phrases.

## Annonces économiques — aujourd'hui et cette semaine
D'abord, calendrier détaillé du jour même : pour CHAQUE indicateur prévu aujourd'hui, donne nom, heure de publication (heure de Paris), valeur précédente, prévision/consensus (et valeur réelle si déjà publiée).

Ensuite, en 3-5 lignes courtes : les publications importantes prévues les 4 prochains jours de bourse (nom + date), pour que le trader anticipe la semaine à venir.

Cherche en particulier s'ils sont prévus cette semaine : Créations d'emplois non agricoles (NFP), taux de chômage, PMI manufacturier, indice ISM manufacturier du mois en cours, inscriptions hebdomadaires au chômage, stocks de pétrole brut (EIA/API), CPI, PPI, ventes au détail, minutes FOMC, discours de responsables Fed.

Sois factuel et concis, pas de blabla. Si une section n'a rien de notable, dis-le en une phrase.`;

  const promptPart2 = `Tu es un analyste macro qui prépare la suite d'un briefing quotidien pour un day trader actif sur les futures US indices (Dow/YM, Nasdaq/NQ, S&P 500/ES, Russell 2000/RTY), basé en Europe.

Nous sommes le ${today}. Utilise la recherche web pour les informations les PLUS RÉCENTES et rédige en français, avec ces 3 sections uniquement :

## Earnings du jour
Résultats d'entreprises majeures publiés aujourd'hui ou ce soir après clôture (Dow, Nasdaq, S&P 500) : nom de l'entreprise, EPS et revenus réels vs consensus, réaction du titre, et impact attendu sur l'indice concerné. Liste chaque entreprise notable individuellement plutôt qu'un résumé vague.

## Vue par indice
Pour chacun des 4 indices (Dow/YM, Nasdaq/NQ, S&P 500/ES, Russell 2000/RTY) : sentiment du jour et niveaux techniques clés si disponibles. Format court, liste à puces par indice.

## Or (XAUUSD)
Prix actuel du XAUUSD, variation du jour, contexte (corrélation avec taux réels, dollar, risque géopolitique, achats des banques centrales). Niveaux de support/résistance clés si disponibles. 3-4 phrases.

## Résumé en 2 phrases
Synthèse ultra-condensée du sentiment de marché du jour, en notant si les indices sont alignés ou divergent.

Sois factuel et concis, pas de blabla.`;

  const instruments = [
    { name: "Dow Jones Industrial", source: "zonebourse.com/cours/indice/DOW-JONES-INDUSTRIAL-4945/cotations/" },
    { name: "Nasdaq Composite", source: "zonebourse.com/cours/indice/NASDAQ-COMPOSITE-4944/cotations/" },
    { name: "S&P 500", source: "zonebourse.com/cours/indice/S-P-500-4985/cotations/" },
    { name: "Russell 2000", source: "zonebourse.com/cours/indice/RUSSELL-2000-157793769/cotations/" },
    { name: "Or (XAUUSD)", source: "Investing.com (historical data XAU USD) ou TradingEconomics" }
  ];

  function buildTablePrompt(instrument) {
    return `Tu es un analyste de marché qui prépare un tableau de données pour un day trader sur les futures US indices.

Nous sommes le ${today}. Utilise la recherche web pour trouver les données réelles des 5 derniers jours de bourse pour : ${instrument.name}.

Cherche en PRIORITÉ sur cette source : ${instrument.source}. Si elle ne donne pas tout, complète avec Investing.com ou Yahoo Finance.

Présente un titre "## ${instrument.name}" suivi d'un tableau markdown avec exactement ces colonnes : Date | Dernier | Volume | Changement | Ouverture | Haut | Low

Une ligne par jour de bourse, les 5 derniers jours disponibles, du plus ancien au plus récent. Utilise des vraies données trouvées via la recherche web, pas d'estimation. Si tu ne trouves pas le volume exact, mets "n/d" plutôt que d'inventer un chiffre.

Format attendu :
## ${instrument.name}
| Date | Dernier | Volume | Changement | Ouverture | Haut | Low |
|---|---|---|---|---|---|---|
| 2026-06-24 | 51,848.90 | 560,271,694 | +0.35% | 51,660.75 | 52,248.69 | 51,617.73 |

Pas de texte superflu, juste le titre et le tableau.`;
  }

  const pivotInstruments = [
    { name: "Dow Jones (YM)", source: "zonebourse.com Dow Jones Industrial ou Investing.com futures YM" },
    { name: "Nasdaq (NQ)", source: "zonebourse.com Nasdaq Composite ou Investing.com futures NQ" },
    { name: "S&P 500 (ES)", source: "zonebourse.com S&P 500 ou Investing.com futures ES" },
    { name: "Russell 2000 (RTY)", source: "zonebourse.com Russell 2000 ou Investing.com futures RTY" }
  ];

  function buildPivotPrompt(instrument) {
    return `Tu es un analyste technique qui prépare des niveaux de trading pour un day trader sur ${instrument.name}, basé en Europe, qui trade en session US avec une stratégie de pivot rejection et de liquidation du range asiatique.

Nous sommes le ${today}. Utilise la recherche web (${instrument.source}) pour trouver le Haut, Bas et Clôture de la séance précédente pour ${instrument.name}.

Calcule les pivot points classiques à partir de ces valeurs (formule standard) :
PP = (Haut + Bas + Clôture) / 3
R1 = 2×PP - Bas | S1 = 2×PP - Haut
R2 = PP + (Haut - Bas) | S2 = PP - (Haut - Bas)
R3 = Haut + 2×(PP - Bas) | S3 = Bas - 2×(Haut - PP)

Cherche aussi le Haut et Bas de la session asiatique la plus récente (Tokyo/Sydney, environ 00h00-08h00 heure de Paris) pour ${instrument.name} ou son proxy (indice cash équivalent), si l'info est trouvable.

Présente le résultat ainsi, sans texte superflu :
## ${instrument.name}
| Niveau | Valeur |
|---|---|
| R3 | ... |
| R2 | ... |
| R1 | ... |
| Pivot (PP) | ... |
| S1 | ... |
| S2 | ... |
| S3 | ... |
| Range asiatique (Haut) | ... |
| Range asiatique (Bas) | ... |

Si le range asiatique n'est pas trouvable précisément, indique "n/d" plutôt que d'inventer.`;
  }

  try {
    const part1 = await callClaude(promptPart1);

      </div>

    content.innerHTML = `
      <div class="briefing">${simpleMarkdownToHtml(part1)}<br><br>${simpleMarkdownToHtml(part2)}</div>
      <div class="loading">

    const tableParts = [];

      content.querySelector('.loading .spinner').nextSibling.textContent = ` Partie 3/4 : historique 5 jours (${idx + 1}/${instruments.length} - ${instruments[idx].name})...`;
      const tablePart = await callClaude(buildTablePrompt(instruments[idx]));
      tableParts.push(tablePart);
    }

    const part3 = tableParts.join('\n\n');

    content.innerHTML = `
      <div class="briefing">${simpleMarkdownToHtml(part1)}<br><br>${simpleMarkdownToHtml(part2)}<br><br>${simpleMarkdownToHtml(part3)}</div>

      const pivotPart = await callClaude(buildPivotPrompt(pivotInstruments[idx]));
      pivotParts.push(pivotPart);
    }

    const part4 = `## Pivot Points & Range Asiatique\n\n` + pivotParts.join('\n\n');

    const fullHtml = `${simpleMarkdownToHtml(part1)}<br><br>${simpleMarkdownToHtml(part2)}<br><br>${simpleMarkdownToHtml(part3)}<br><br>${simpleMarkdownToHtml(part4)}`;

    content.innerHTML = `
      <div class="briefing">${fullHtml}</div>
      <div class="meta">
        <button id="copy-btn" class="copy-btn">📋 Copier le briefing</button>
        Généré le ${new Date().toLocaleString('fr-FR')}
      </div>
    `;

    document.getElementById('copy-btn').addEventListener('click', () => {
      const plainText = content.querySelector('.briefing').innerText;
      navigator.clipboard.writeText(plainText).then(() => {
        const copyBtn = document.getElementById('copy-btn');
        const original = copyBtn.textContent;
        copyBtn.textContent = '✅ Copié !';
        setTimeout(() => { copyBtn.textContent = original; }, 2000);
      });
    });

    function extractBadges(tableParts, instrumentList) {
      let badges = '';
      tableParts.forEach((tablePart, i) => {
        const lines = tablePart.split('\n').filter(l => l.trim().startsWith('|'));
        const dataLines = lines.filter(l => !/^\|?[\s:|-]+\|?$/.test(l));
        if (dataLines.length < 2) return;
        const lastRow = dataLines[dataLines.length - 1].split('|').map(c => c.trim()).filter(c => c !== '');
        const changement = lastRow[3] || '';
        const isUp = changement.trim().startsWith('+');
        const label = instrumentList[i].name.split(' ')[0];
        badges += `<span class="badge ${isUp ? 'up' : 'down'}">${label} ${changement}</span>`;
      });
      return badges;
    }

    const badgesHtml = extractBadges(tableParts, instruments);

    const dateLabel = new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    await saveBriefing(todayKey(), dateLabel, fullHtml, badgesHtml);
  } catch (err) {
    content.innerHTML = `
      <div class="error">
        ⚠️ Erreur lors de la génération du briefing : ${err.message}<br>
        Réessaie dans quelques instants.
      </div>
    `;
    console.error("Briefing error:", err);
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
